services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mangamotion
      POSTGRES_USER: mangamotion
      POSTGRES_PASSWORD: mangamotion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mangamotion -d mangamotion"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mangamotion
      SPRING_DATASOURCE_USERNAME: mangamotion
      SPRING_DATASOURCE_PASSWORD: mangamotion
      AI_SERVICE_URL: http://ai-service:8000
      STORAGE_PATH: /app/storage
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      STORAGE_PATH: /app/storage
      MODELS_PATH: /app/models
    volumes:
      - storage_data:/app/storage
      - models_data:/app/models
    # Uncomment for GPU access (requires NVIDIA Container Toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
  storage_data:
  models_data:
